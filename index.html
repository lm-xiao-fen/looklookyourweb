<!DOCTYPE html>
<html>
<head>
  <title>Status Monitor</title>
</head>
<body>
  <h1>网站状态</h1>
  <ul id="list"></ul>

  <script>
    async function load() {
      const res = await fetch("/api/status");
      const data = await res.json();

      const list = document.getElementById("list");
      list.innerHTML = "";

      data.forEach(site => {
        const li = document.createElement("li");
        li.textContent = `${site.name} - ${site.status} - ${site.latency || "-"} ms`;
        list.appendChild(li);
      });
    }

    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
